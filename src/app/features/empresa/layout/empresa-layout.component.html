<div class="flex min-h-screen" style="background-color: var(--color-primary)">
  <!-- SIDEBAR -->
  <aside
    class="w-64 sticky top-0 h-screen bg-white border-r border-slate-200 flex flex-col shadow-sm"
  >
    <!-- Logo/Brand -->
    <div class="px-6 py-5 border-b border-slate-200">
      <h1
        class="text-2xl font-bold bg-linear-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
      >
        Slation
      </h1>
      <p class="text-xs text-slate-500 mt-1">Panel de administración</p>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
      <!-- Agenda -->
      <a
        routerLink="/empresa/agenda"
        routerLinkActive="bg-indigo-50 text-indigo-600"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
      >
        <lucide-icon [img]="Calendar" class="w-5 h-5"></lucide-icon>
        <span class="font-medium text-sm">Agenda</span>
      </a>

      <!-- Reservas -->
      <a
        routerLink="/empresa/reservas"
        routerLinkActive="bg-indigo-50 text-indigo-600"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
      >
        <lucide-icon [img]="ClipboardList" class="w-5 h-5"></lucide-icon>
        <span class="font-medium text-sm">Reservas</span>
      </a>

      <!-- Disponibilidad -->
      <a
        routerLink="/empresa/disponibilidad"
        routerLinkActive="bg-indigo-50 text-indigo-600"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
      >
        <lucide-icon [img]="Clock" class="w-5 h-5"></lucide-icon>
        <span class="font-medium text-sm">Disponibilidad</span>
      </a>

      <!-- Config Section -->
      @if (store.contexto()?.rol === 'owner') {
        <div class="pt-6 pb-2">
          <div class="flex items-center gap-2 px-3 mb-2">
            <lucide-icon [img]="Settings" class="w-4 h-4 text-slate-500"></lucide-icon>
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Configuración
            </span>
          </div>
        </div>

        <!-- Servicios -->
        <a
          routerLink="/empresa/servicios"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
        >
          <lucide-icon [img]="FileText" class="w-5 h-5"></lucide-icon>
          <span class="font-medium text-sm">Servicios</span>
        </a>

        <!-- Profesionales -->
        <a
          routerLink="/empresa/profesional-servicios"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
        >
          <lucide-icon [img]="Users" class="w-5 h-5"></lucide-icon>
          <span class="font-medium text-sm">Profesionales</span>
        </a>

        <!-- Sucursales -->
        <a
          routerLink="/empresa/sucursales"
          routerLinkActive="bg-indigo-50 text-indigo-600"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-700 hover:bg-slate-50 transition-colors group"
        >
          <lucide-icon [img]="Building2" class="w-5 h-5"></lucide-icon>
          <span class="font-medium text-sm">Sucursales</span>
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="px-3 py-4 border-t border-slate-200">
      <button
        (click)="logout()"
        class="flex cursor-pointer items-center justify-center gap-2 w-full px-4 py-2.5 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors font-medium text-sm"
      >
        <lucide-icon [img]="LogOut" class="w-4 h-4"></lucide-icon>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-auto">
    <div class="max-w-7xl mx-auto px-8 py-6">
      <router-outlet />
    </div>
  </main>
</div>
