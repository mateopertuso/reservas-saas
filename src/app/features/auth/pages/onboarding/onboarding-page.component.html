<div class="min-h-screen flex items-center justify-center bg-slate-50 px-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <!-- título -->
    <h1 class="text-xl font-semibold text-center mb-2">Crear tu empresa</h1>

    <p class="text-sm text-slate-500 text-center mb-6">Configurá tu espacio en segundos</p>

    <!-- pasos -->
    <div class="flex justify-center gap-2 mb-6">
      <div
        class="w-2 h-2 rounded-full"
        [class.bg-slate-900]="paso >= 1"
        [class.bg-slate-300]="paso < 1"
      ></div>
      <div
        class="w-2 h-2 rounded-full"
        [class.bg-slate-900]="paso >= 2"
        [class.bg-slate-300]="paso < 2"
      ></div>
      <div
        class="w-2 h-2 rounded-full"
        [class.bg-slate-900]="paso >= 3"
        [class.bg-slate-300]="paso < 3"
      ></div>
    </div>

    <!-- PASO 1 -->
    @if (paso === 1) {
      <div class="space-y-4">
        <input
          [(ngModel)]="nombre"
          placeholder="Nombre de la empresa"
          class="w-full border border-slate-300 p-3 rounded-lg"
        />

        <button
          (click)="siguiente()"
          [disabled]="!nombre"
          class="w-full bg-slate-900 text-white py-3 rounded-lg disabled:opacity-50"
        >
          Continuar
        </button>
      </div>
    }

    <!-- PASO 2 -->
    @if (paso === 2) {
      <div class="space-y-4">
        <input
          [(ngModel)]="rubro"
          placeholder="Rubro (ej: Barbería)"
          class="w-full border border-slate-300 p-3 rounded-lg"
        />

        <div class="flex gap-2">
          <button (click)="volver()" class="w-full border py-3 rounded-lg">Volver</button>

          <button
            (click)="siguiente()"
            [disabled]="!rubro"
            class="w-full bg-slate-900 text-white py-3 rounded-lg disabled:opacity-50"
          >
            Continuar
          </button>
        </div>
      </div>
    }

    <!-- PASO 3 -->
    @if (paso === 3) {
      <div class="space-y-4">
        <input
          [(ngModel)]="color"
          placeholder="#3B82F6"
          class="w-full border border-slate-300 p-3 rounded-lg"
        />

        <!-- preview -->
        <div
          class="h-12 rounded-lg flex items-center justify-center text-white font-medium"
          [style.background]="color"
        >
          Vista previa
        </div>

        <div class="flex gap-2">
          <button (click)="volver()" class="w-full border py-3 rounded-lg">Volver</button>

          <button
            (click)="crear()"
            [disabled]="loading"
            class="w-full bg-slate-900 text-white py-3 rounded-lg"
          >
            {{ loading ? 'Creando...' : 'Crear empresa' }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
