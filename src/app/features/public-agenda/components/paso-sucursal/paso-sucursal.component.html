<div class="text-center">
  <!-- Empresa -->
  @if (empresa()) {
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Bienvenido a {{ empresa()?.nombre }}</h1>

    <p class="text-sm text-slate-500 mb-6">Seleccioná una sucursal</p>
  }

  <!-- Lista -->
  <div class="space-y-3">
    @for (sucursal of sucursales(); track sucursal.id) {
      <div
        (click)="seleccionarSucursal(sucursal)"
        class="cursor-pointer rounded-xl border border-slate-200 p-4 text-left hover:border-black transition"
      >
        <p class="font-medium text-slate-900">
          {{ sucursal.nombre }}
        </p>

        <p class="text-sm text-slate-500">
          {{ sucursal.direccion }}
        </p>
      </div>
    }
  </div>
</div>
