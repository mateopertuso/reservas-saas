<div class="min-h-screen flex items-center justify-center bg-slate-50">
  <div class="mb-4 flex items-center justify-between">
    @if (paso() > 1) {
      <button (click)="volverPaso()" class="text-sm text-gray-500">← Volver</button>
    }

    <span class="text-sm text-gray-400"> Paso {{ paso() }} de 7 </span>
  </div>
  <div class="w-full max-w-xl bg-white rounded-2xl p-6 shadow">
    @if (paso() === 1) {
      <app-paso-sucursal (siguiente)="siguientePaso()" />
    }

    @if (paso() === 2) {
      <app-paso-servicio (siguiente)="siguientePaso()" />
    }

    @if (paso() === 3) {
      <app-paso-profesional (siguiente)="siguientePaso()" />
    }

    @if (paso() === 4) {
      <app-paso-fecha (siguiente)="siguientePaso()" />
    }

    @if (paso() === 5) {
      <app-paso-horario (siguiente)="siguientePaso()" />
    }

    @if (paso() === 6) {
      <app-paso-datos (siguiente)="siguientePaso()" />
    }

    @if (paso() === 7) {
      <app-paso-confirmacion />
    }
  </div>
</div>
